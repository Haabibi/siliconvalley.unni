<meta charset="UTF-8">
<title>Export Instagram Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #1a1a2e;
    color: #e4e4ef;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 20px;
  }

  /* ── Controls ── */
  .controls {
    max-width: 1100px;
    margin: 0 auto 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .controls select, .controls button {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid #2e2e4e;
    background: #12121a;
    color: #e4e4ef;
    cursor: pointer;
  }
  .controls select { min-width: 300px; }
  .controls button {
    background: linear-gradient(135deg, #a855f7, #3b82f6);
    border: none;
    font-weight: 700;
    transition: opacity .2s;
  }
  .controls button:hover { opacity: .85; }
  .controls button:disabled { opacity: .4; cursor: not-allowed; }
  .status {
    width: 100%;
    font-size: 13px;
    color: #7a7a8e;
    margin-top: 4px;
  }

  /* ── Style Picker ── */
  .style-picker {
    max-width: 1100px;
    margin: 0 auto 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .style-option {
    flex: 1;
    min-width: 180px;
    padding: 16px 20px;
    border-radius: 14px;
    border: 2px solid #2e2e4e;
    background: #12121a;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .style-option:hover { border-color: #a855f7; transform: translateY(-2px); }
  .style-option.active { border-color: #a855f7; background: #1a1a3e; box-shadow: 0 0 20px rgba(168,85,247,.2); }
  .style-option .style-preview {
    height: 60px;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .style-option .style-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }
  .style-option .style-desc {
    font-size: 12px;
    color: #7a7a8e;
    margin-top: 4px;
  }

  /* ── Preview Area ── */
  .preview-area {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    padding: 20px 0;
  }
  .preview-thumb {
    width: 270px;
    height: 360px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #2e2e4e;
    cursor: pointer;
    transition: border-color .2s, transform .2s;
    position: relative;
  }
  .preview-thumb:hover { border-color: #a855f7; transform: scale(1.02); }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb .slide-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.75);
    color: #fff;
    font-size: 11px;
    padding: 6px 10px;
    text-align: center;

    left: -9999px;
    top: 0;
    width: 1080px;
    height: 1440px;

function pickStyle(name) {
  currentStyle = name;
  document.querySelectorAll('.style-option').forEach(el => {
    el.classList.toggle('active', el.dataset.style === name);

  if (area.children.length > 0) previewCard();
}

const accentMap = {
  purple:'#a855f7', blue:'#3b82f6', cyan:'#06b6d4', pink:'#ec4899',
  orange:'#f97316', green:'#22c55e', red:'#ef4444', yellow:'#eab308'
};
const cardAccents = {};
const accentCycle = ['purple','blue','cyan','pink','orange','green','red','yellow'];
for (let i = 1; i <= 300; i++) {
  cardAccents[i] = accentCycle[(i - 1) % accentCycle.length];
}

// Populate dropdown

for (let i = 1; i <= 300; i++) {
  if (!window.DEEP_DIVES[i]) continue;
  const d = window.DEEP_DIVES[i];

  opt.value = i;
  opt.textContent = `#${String(i).padStart(3,'0')} — ${d.icon} ${d.title}`;
  sel.appendChild(opt);
}

function status(msg) { document.getElementById('status').textContent = msg; }
function getColor(cardNum) { return accentMap[cardAccents[cardNum]] || '#a855f7'; }

// ═══════════════════════════════════════════
// VISUAL CONTENT ENGINE
// ═══════════════════════════════════════════
// Design philosophy: Big text. Strong hierarchy. Lots of whitespace.
// No complex diagrams. Think @visualizevalue, not PowerPoint.

function extractLabel(item) {
  // If there's a <strong> tag, use that as label
  const m = item.match(/<strong>([^<]+)<\/strong>/);
  if (m) return m[1];
  // If there's a dash separator, use everything before the dash
  const plain = item.replace(/<[^>]+>/g, '');
  const dashMatch = plain.match(/^(.+?)(?:\s+(?:&mdash;|—|–)\s+)/);
  if (dashMatch) return dashMatch[1].trim();
  // Otherwise use the full text (truncate at 80 chars if very long)
  const full = plain.trim();
  return full.length > 80 ? full.substring(0, 77) + '...' : full;
}

function extractDesc(item) {
  const plain = item.replace(/<[^>]+>/g, '');
  // Only extract description if there's a proper dash separator (mdash, emdash, endash)
  // NOT a regular hyphen inside words like "Module-owned"
  const m = plain.match(/(?:&mdash;|—|–)\s+(.+)/);
  if (m) { const d = m[1].trim(); return d.length > 65 ? d.substring(0, 62) + '...' : d; }
  return '';
}

// ── Step Cards (how/guide) ──
// Clean numbered cards with emoji, no connector line
function vizTimeline(items, color, t) {
  const entries = items.slice(0, 6).map(it => ({ label: extractLabel(it), desc: extractDesc(it) }));
  const isNeon = currentStyle === 'neon';
  const glow = isNeon ? `text-shadow:0 0 20px ${color}80;` : '';
  const stepIcons = ['\u{1F3AF}','\u{26A1}','\u{1F527}','\u{1F4E6}','\u{1F680}','\u{2705}'];

  let h = `<div style="display:flex;flex-direction:column;gap:14px;margin-bottom:24px">`;
  entries.forEach((e, i) => {
    h += `<div style="display:flex;align-items:flex-start;gap:18px;padding:20px 24px;border-radius:16px;background:${t.statBg};border:1px solid ${t.statBorder}${isNeon ? ';box-shadow:0 0 12px '+color+'15' : ''}">
      <div style="width:48px;height:48px;border-radius:14px;background:${color}15;border:1px solid ${color}25;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${stepIcons[i] || '\u{1F4CC}'}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:800;color:${color};margin-bottom:4px;font-family:'JetBrains Mono',monospace">Step ${i + 1}</div>
        <div style="font-size:22px;font-weight:800;color:${t.text};line-height:1.3;font-family:${t.font};${glow}">${e.label}</div>
        ${e.desc ? `<div style="font-size:16px;color:${t.muted};margin-top:6px;line-height:1.45">${e.desc}</div>` : ''}
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ── Concept Cards (concepts) ──
// 2-column cards with emoji icons matching index.html
function vizConcepts(items, color, t) {
  const entries = items.slice(0, 4).map(it => ({ label: extractLabel(it), desc: extractDesc(it) }));
  const isNeon = currentStyle === 'neon';
  const glow = isNeon ? `box-shadow:0 0 16px ${color}18;` : '';
  const icons = ['\u{1F4A1}','\u{1F511}','\u{2699}\u{FE0F}','\u{1F9E9}'];

  let h = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">`;
  entries.forEach((e, i) => {
    h += `<div style="border-radius:20px;overflow:hidden;background:${t.statBg};border:1px solid ${t.statBorder};${glow}">
      <div style="height:5px;background:${color}${isNeon ? ';box-shadow:0 0 10px '+color+'60' : ''}"></div>
      <div style="padding:24px">
        <div style="width:42px;height:42px;border-radius:12px;background:${color}15;border:1px solid ${color}25;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px">${icons[i] || '\u{1F4CC}'}</div>
        <div style="font-size:22px;font-weight:800;color:${t.text};line-height:1.2;margin-bottom:8px;font-family:${t.font}">${e.label}</div>
        ${e.desc ? `<div style="font-size:16px;color:${t.muted};line-height:1.5">${e.desc}</div>` : ''}
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ── Problem List (problem) ──
// Bold items with severity emoji icons matching index.html
function vizProblems(items, color, t) {
  const entries = items.slice(0, 4).map(it => ({ label: extractLabel(it), desc: extractDesc(it) }));
  const isNeon = currentStyle === 'neon';
  const warn = '#ef4444';
  const sevIcons = ['\u{1F534}','\u{1F7E0}','\u{1F7E1}','\u{26A0}\u{FE0F}'];

  let h = `<div style="display:flex;flex-direction:column;gap:16px;margin-bottom:24px">`;
  entries.forEach((e, i) => {
    h += `<div style="display:flex;align-items:flex-start;gap:20px;padding:24px;border-radius:16px;background:${warn}06;border:1px solid ${warn}18${isNeon ? ';box-shadow:0 0 12px '+warn+'15' : ''}">
      <div style="width:48px;height:48px;border-radius:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px">${sevIcons[i] || '\u{26A0}\u{FE0F}'}</div>
      <div>
        <div style="font-size:22px;font-weight:800;color:${t.text};line-height:1.3;font-family:${t.font}">${e.label}</div>
        ${e.desc ? `<div style="font-size:16px;color:${t.muted};margin-top:6px;line-height:1.4">${e.desc}</div>` : ''}
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ── Architecture Stack (example) ──
// Full-width bars with medal emojis matching index.html
function vizStack(items, color, t) {
  const entries = items.slice(0, 5).map(it => ({ label: extractLabel(it), desc: extractDesc(it) }));
  const isNeon = currentStyle === 'neon';
  const isLight = currentStyle === 'clean' || currentStyle === 'editorial';
  const medals = ['\u{1F947}','\u{1F948}','\u{1F949}','\u{2B50}','\u{2726}'];

  let h = `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">`;
  entries.forEach((e, i) => {
    const intensity = 1 - (i * 0.12);
    const bg = isLight
      ? `${color}${Math.round(intensity * 12).toString(16).padStart(2, '0')}`
      : `${color}${Math.round(intensity * 15).toString(16).padStart(2, '0')}`;
    const border = `${color}${Math.round(intensity * 30).toString(16).padStart(2, '0')}`;
    h += `<div style="padding:18px 24px;border-radius:14px;background:${bg};border:1px solid ${border};display:flex;align-items:center;gap:16px${isNeon ? ';box-shadow:0 0 12px '+color+Math.round(intensity*20).toString(16).padStart(2,'0') : ''}">
      <div style="width:40px;height:40px;border-radius:10px;background:${color}20;border:1px solid ${color}30;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${medals[i] || '\u{2726}'}</div>
      <div style="flex:1">
        <div style="font-size:20px;font-weight:800;color:${t.text};font-family:${t.font}">${e.label}</div>
        ${e.desc ? `<div style="font-size:14px;color:${t.muted};margin-top:4px">${e.desc}</div>` : ''}
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ── Do/Don't Cards (practices/action) ──
// Clean cards with green check or contextual accent
function vizChecklist(items, color, t) {
  const entries = items.slice(0, 5).map(it => {
    const raw = it.replace(/<[^>]+>/g, '');
    const isDont = raw.startsWith('❌') || raw.toLowerCase().startsWith("don't");
    const isDo = raw.startsWith('✅');
    const label = extractLabel(it).replace(/^[✅❌]\s*/, '');
    const desc = extractDesc(it);
    return { label, desc, isDont, isDo };
  });
  const isNeon = currentStyle === 'neon';

  let h = `<div style="display:flex;flex-direction:column;gap:12px;margin-bottom:24px">`;
  entries.forEach(e => {
    const accent = e.isDont ? '#ef4444' : '#22c55e';
    const icon = e.isDont ? '✕' : '✓';
    const bg = e.isDont ? `${accent}08` : `${accent}08`;
    h += `<div style="display:flex;align-items:center;gap:18px;padding:18px 24px;border-radius:14px;background:${bg};border:1px solid ${accent}20${isNeon ? ';box-shadow:0 0 10px '+accent+'15' : ''}">
      <div style="width:40px;height:40px;border-radius:12px;background:${accent}15;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;font-weight:900;color:${accent}${isNeon ? ';text-shadow:0 0 10px '+accent+'60' : ''}">${icon}</div>
      <div>
        <div style="font-size:20px;font-weight:700;color:${t.text};font-family:${t.font}">${e.label}</div>
        ${e.desc ? `<div style="font-size:15px;color:${t.muted};margin-top:4px">${e.desc}</div>` : ''}
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// ── Pitfall Cards (pitfalls) ──
// Red-tinted danger cards with unique warning emojis matching index.html
function vizPitfalls(items, color, t) {
  const entries = items.slice(0, 4).map(it => ({ label: extractLabel(it), desc: extractDesc(it) }));
  const isNeon = currentStyle === 'neon';
  const warn = '#ef4444';
  const warnIcons = ['\u{1F4A3}','\u{1F573}\u{FE0F}','\u{1F525}','\u{1F480}'];

  let h = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">`;
  entries.forEach((e, i) => {
    h += `<div style="border-radius:18px;overflow:hidden;background:${warn}06;border:1px solid ${warn}18;position:relative${isNeon ? ';box-shadow:0 0 14px '+warn+'15' : ''}">
      <div style="height:4px;background:linear-gradient(90deg,${warn},${warn}40)${isNeon ? ';box-shadow:0 0 8px '+warn+'50' : ''}"></div>
      <div style="padding:22px;position:relative">
        <div style="position:absolute;right:14px;top:14px;font-size:36px;opacity:.08">${warnIcons[i] || '\u{26A0}\u{FE0F}'}</div>
        <div style="width:46px;height:46px;border-radius:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px">${warnIcons[i] || '\u{26A0}\u{FE0F}'}</div>
        <div style="font-size:20px;font-weight:800;color:${t.text};line-height:1.25;margin-bottom:6px;font-family:${t.font}">${e.label}</div>
        ${e.desc ? `<div style="font-size:15px;color:${t.muted};line-height:1.4">${e.desc}</div>` : ''}
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// Master: generate visual content for a slide type
function generateDiagram(slideType, content, color, t, slideTitle) {
  if (!content) return '';
  const bulletBlock = content.find(b => b.kind === 'bullets');
  if (!bulletBlock || bulletBlock.items.length < 2) return '';

  switch(slideType) {
    case 'how':
    case 'guide':
      return vizTimeline(bulletBlock.items, color, t);
    case 'concepts':
      return vizConcepts(bulletBlock.items, color, t);
    case 'example':
      return vizStack(bulletBlock.items, color, t);
    case 'practices':
    case 'action':
      return vizChecklist(bulletBlock.items, color, t);
    case 'pitfalls':
      return vizPitfalls(bulletBlock.items, color, t);
    case 'problem':
      return vizProblems(bulletBlock.items, color, t);
    default:
      return '';
  }
}

// ═══════════════════════════════════════════
// RENDER SLIDE HTML
// ═══════════════════════════════════════════
function renderSlideHTML(cardNum, slideIdx) {
  const d = window.DEEP_DIVES[cardNum];
  const color = getColor(cardNum);
  const s = d.slides[slideIdx];
  const total = d.slides.length;
  const pct = ((slideIdx + 1) / total * 100).toFixed(0);
  const t = S();

  // Neon: extra glow elements
  const neonGlow = currentStyle === 'neon' ? `
    <div style="position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;border-radius:50%;background:${color}10;filter:blur(100px);pointer-events:none"></div>
    <div style="position:absolute;bottom:-50px;right:-50px;width:300px;height:300px;border-radius:50%;background:${color}08;filter:blur(80px);pointer-events:none"></div>
  ` : '';

  // Glass: decorative orbs
  const glassOrbs = currentStyle === 'glass' ? `
    <div style="position:absolute;top:80px;right:-60px;width:250px;height:250px;border-radius:50%;background:${color}12;filter:blur(60px);pointer-events:none"></div>
    <div style="position:absolute;bottom:200px;left:-80px;width:200px;height:200px;border-radius:50%;background:${color}0a;filter:blur(50px);pointer-events:none"></div>
  ` : '';

  // Check if this slide type should get a diagram
  const diagramTypes = ['how', 'guide', 'concepts', 'example', 'practices', 'action', 'pitfalls', 'problem'];
  const hasDiagram = diagramTypes.includes(s.type);
  const diagramHTML = hasDiagram ? generateDiagram(s.type, s.content, color, t, s.title) : '';

  let contentHTML = '';
  if (diagramHTML) {
    // Show diagram first, then only non-bullet content (text, callouts, stats — skip bullets since diagram replaces them)
    contentHTML = diagramHTML;
    if (s.content) {
      s.content.forEach(block => {
        switch(block.kind) {
          case 'text':
            contentHTML += `<div style="font-size:22px;line-height:1.5;color:${t.textSecondary};margin-bottom:16px;font-family:${t.font}">${block.value}</div>`;
            break;
          case 'callout': {
            const co = t.callout[block.style] || t.callout.insight;
            contentHTML += `<div style="border-radius:14px;padding:18px 22px;font-size:20px;line-height:1.4;margin-bottom:16px;border-left:4px solid ${co.border};background:${co.bg};color:${co.text};font-family:${t.font}">${block.value}</div>`;
            break;
          }
          case 'stats':
            contentHTML += `<div style="display:flex;gap:16px;margin-bottom:20px">`;
            block.items.forEach(st => {
              contentHTML += `<div style="flex:1;text-align:center;padding:16px 12px;border-radius:14px;background:${t.statBg};border:1px solid ${t.statBorder}"><div style="font-size:32px;font-weight:900;color:${color}">${st.value}</div><div style="font-size:14px;color:${t.muted}">${st.label}</div></div>`;
            });
            contentHTML += `</div>`;
            break;
          // bullets and code are skipped when diagram is present
          case 'sources':
            contentHTML += `<div style="margin-top:auto;padding-top:12px;border-top:1px solid ${t.border}">`;
            contentHTML += `<div style="font-size:13px;font-weight:700;color:${t.muted};text-transform:uppercase;letter-spacing:2px;margin-bottom:6px">Sources</div>`;
            block.items.forEach(src => {
              contentHTML += `<div style="font-size:14px;color:${t.muted};padding:3px 0;font-family:${t.font}">${src}</div>`;
            });
            contentHTML += `</div>`;
            break;
        }
      });
    }
  } else {
    // No diagram — render all content normally
    if (s.content) {
      s.content.forEach(block => {
        switch(block.kind) {
          case 'text':
            contentHTML += `<div style="font-size:24px;line-height:1.6;color:${t.textSecondary};margin-bottom:24px;font-family:${t.font}">${block.value}</div>`;
            break;
          case 'bullets':
            contentHTML += `<ul style="list-style:none;padding:0;margin-bottom:24px">`;
            block.items.forEach(item => {
              contentHTML += `<li style="font-size:22px;line-height:1.5;padding:10px 0 10px 32px;position:relative;color:${t.textSecondary};border-bottom:1px solid ${t.bulletBorder};font-family:${t.font}"><span style="position:absolute;left:0;top:18px;width:10px;height:10px;border-radius:50%;background:${color};display:block${currentStyle === 'neon' ? ';box-shadow:0 0 8px '+color+'80' : ''}"></span><span>${item}</span></li>`;
            });
            contentHTML += `</ul>`;
            break;
          case 'code':
            contentHTML += `<div style="background:${t.codeBg};border:1px solid ${t.codeBorder};border-radius:16px;padding:28px 32px;font-family:'JetBrains Mono',monospace;font-size:18px;line-height:1.6;color:${t.codeText};white-space:pre-wrap;margin-bottom:24px;overflow:hidden${currentStyle === 'neon' ? ';box-shadow:0 0 15px '+color+'15' : ''}">${block.value}</div>`;
            break;
          case 'callout': {
            const co = t.callout[block.style] || t.callout.insight;
            contentHTML += `<div style="border-radius:16px;padding:24px 28px;font-size:22px;line-height:1.5;margin-bottom:24px;border-left:5px solid ${co.border};background:${co.bg};color:${co.text};font-family:${t.font}">${block.value}</div>`;
            break;
          }
          case 'stats':
            contentHTML += `<div style="display:flex;gap:20px;margin-bottom:28px">`;
            block.items.forEach(st => {
              contentHTML += `<div style="flex:1;text-align:center;padding:24px 16px;border-radius:16px;background:${t.statBg};border:1px solid ${t.statBorder}${currentStyle === 'neon' ? ';box-shadow:0 0 15px '+color+'15;border-color:'+color+'30' : ''}"><div style="font-size:42px;font-weight:900;letter-spacing:-1px;margin-bottom:6px;color:${color}${currentStyle === 'neon' ? ';text-shadow:0 0 20px '+color+'60' : ''}">${st.value}</div><div style="font-size:16px;color:${t.muted}">${st.label}</div></div>`;
            });
            contentHTML += `</div>`;
            break;
          case 'quality':
            break; // skip quality metrics
          case 'sources':
            contentHTML += `<div style="margin-top:auto;padding-top:16px;border-top:1px solid ${t.border}">`;
            contentHTML += `<div style="font-size:13px;font-weight:700;color:${t.muted};text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Sources</div>`;
            block.items.forEach(src => {
              contentHTML += `<div style="font-size:14px;color:${t.muted};padding:4px 0;font-family:${t.font}">${src}</div>`;
            });
            contentHTML += `</div>`;
            break;
        }
      });
    }
  }

  // Type label colors
  const typeColors = {
    hook: color, problem: '#ef4444', concepts: color, how: '#3b82f6',
    example: '#f97316', guide: '#22c55e', practices: '#06b6d4',
    pitfalls: '#ef4444', action: '#a855f7', summary: color
  };
  const tc = typeColors[s.type] || color;

  // Glass panel for content
  const glassPanelStyle = currentStyle === 'glass'
    ? `background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;margin:0 40px;padding:32px 24px`
    : `padding:32px 64px`;

  // Neon border for the card
  const neonCardBorder = currentStyle === 'neon'
    ? `border:1px solid ${color}30;box-shadow:inset 0 0 60px ${color}08, 0 0 30px ${color}10`
    : '';

  return `
    <div style="width:1080px;height:1440px;background:${t.cardBg};display:flex;flex-direction:column;padding:0;font-family:${t.font};color:${t.text};overflow:hidden;position:relative;${neonCardBorder}">
      ${neonGlow}${glassOrbs}
      <div style="height:8px;width:100%;flex-shrink:0;${t.accentBarStyle(color)}"></div>
      <div style="padding:56px 64px 0;flex-shrink:0;${t.slideHeaderBg(color)}">
        <div style="font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;color:${color}">Card ${String(cardNum).padStart(2,'0')} &middot; ${d.tag}</div>
        <div style="font-size:56px;margin-bottom:20px;display:block;width:88px;height:88px;line-height:88px;text-align:center;border-radius:20px;${t.iconBg(color)}">${d.icon}</div>
        <div style="display:inline-block;padding:8px 20px;border-radius:100px;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;${t.typeLabelStyle(tc)}">${s.typeLabel}</div>
        <div style="font-size:40px;font-weight:800;line-height:1.2;letter-spacing:-1px;margin-bottom:28px;color:${t.text};font-family:${t.titleFont}">${s.title}</div>
      </div>
      <div style="${glassPanelStyle};flex:1;overflow:hidden">${contentHTML}</div>
      <div style="padding:24px 64px 40px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-top:1px solid ${t.footerBorder}">
        <div style="display:flex;align-items:center;gap:10px">
          <img src="avatar.jpg" style="width:36px;height:36px;border-radius:50%;border:2px solid ${color};object-fit:cover" />
          <div style="font-size:18px;font-weight:700;letter-spacing:1px;color:${color}">@siliconvalley.unni</div>
        </div>
        <div style="font-size:16px;color:${t.muted};font-weight:600">${slideIdx + 1} / ${total}</div>
      </div>
      <div style="position:absolute;bottom:0;left:0;height:6px;border-radius:0 3px 0 0;width:${pct}%;background:${color}${currentStyle === 'neon' ? ';box-shadow:0 0 10px '+color+'80' : ''}"></div>
    </div>
  `;
}

function renderCoverHTML(cardNum) {

  // Extract hook stat / text from slide 0

        const neonStat = currentStyle === 'neon' ? `box-shadow:0 0 20px ${color}20, inset 0 0 30px ${color}08;border-color:${color}40` : '';

}

// ═══════════════════════════════════════════
// CAPTURE & DOWNLOAD
// ═══════════════════════════════════════════
async function captureSlide(html) {
  const box = document.getElementById('renderBox');
  box.innerHTML = html;
  await new Promise(r => setTimeout(r, 100));
  const card = box.querySelector('[style*="width:1080px"]') || box.firstElementChild;
  const canvas = await html2canvas(card, {
    width: 1080,
    height: 1440,
    scale: 1,
    backgroundColor: S().cardBg,
    useCORS: true,
    logging: false
  });
  return canvas;
}

async function previewCard() {
  const num = parseInt(sel.value);
  const d = window.DEEP_DIVES[num];
  if (!d) return;

  const area = document.getElementById('previewArea');
  area.innerHTML = '';
  status(`Rendering ${d.slides.length + 1} slides (${STYLES[currentStyle].name} style)...`);

  const coverCanvas = await captureSlide(renderCoverHTML(num));
  addThumb(area, coverCanvas, 'Cover', num, 'cover');

  for (let i = 0; i < d.slides.length; i++) {
    status(`Rendering slide ${i + 1}/${d.slides.length} (${STYLES[currentStyle].name})...`);
    const canvas = await captureSlide(renderSlideHTML(num, i));
    addThumb(area, canvas, d.slides[i].typeLabel, num, i);
  }
  status(`Done! ${d.slides.length + 1} slides rendered in "${STYLES[currentStyle].name}" style. Click any to download.`);
}

function addThumb(area, canvas, label, cardNum, slideIdx) {
  const div = document.createElement('div');
  div.className = 'preview-thumb';
  const img = document.createElement('img');
  img.src = canvas.toDataURL('image/png');
  div.appendChild(img);
  const lbl = document.createElement('div');
  lbl.className = 'slide-label';
  lbl.textContent = label;
  div.appendChild(lbl);
  div.onclick = () => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `card-${String(cardNum).padStart(3,'0')}-${currentStyle}-slide-${String(slideIdx === 'cover' ? 0 : slideIdx + 1).padStart(2,'0')}.png`;
    a.click();
  };
  area.appendChild(div);
}

async function downloadCard() {
  const num = parseInt(sel.value);
  const d = window.DEEP_DIVES[num];
  if (!d) return;

  document.getElementById('btnDownload').disabled = true;
  status(`Generating ${d.slides.length + 1} images (${STYLES[currentStyle].name})...`);

  const coverCanvas = await captureSlide(renderCoverHTML(num));
  downloadCanvas(coverCanvas, `card-${String(num).padStart(3,'0')}-${currentStyle}-slide-00.png`);

  for (let i = 0; i < d.slides.length; i++) {
    status(`Downloading ${i + 1}/${d.slides.length}...`);
    const canvas = await captureSlide(renderSlideHTML(num, i));
    downloadCanvas(canvas, `card-${String(num).padStart(3,'0')}-${currentStyle}-slide-${String(i + 1).padStart(2,'0')}.png`);
    await new Promise(r => setTimeout(r, 200));
  }
  status(`Done! ${d.slides.length + 1} images downloaded (${STYLES[currentStyle].name}).`);
  document.getElementById('btnDownload').disabled = false;
}

function downloadCanvas(canvas, filename) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  a.click();
}

async function downloadAllCards() {
  if (!confirm(`This will download ~1,254 images in "${STYLES[currentStyle].name}" style. Continue?`)) return;
  document.getElementById('btnDownloadAll').disabled = true;

  for (let num = 1; num <= 300; num++) {
    const d = window.DEEP_DIVES[num];
    if (!d) continue;
    status(`Card ${num}/300: generating cover (${STYLES[currentStyle].name})...`);

    const coverCanvas = await captureSlide(renderCoverHTML(num));
    downloadCanvas(coverCanvas, `card-${String(num).padStart(3,'0')}-${currentStyle}-slide-00.png`);
    await new Promise(r => setTimeout(r, 150));

    for (let i = 0; i < d.slides.length; i++) {
      status(`Card ${num}/300: slide ${i + 1}/${d.slides.length}...`);
      const canvas = await captureSlide(renderSlideHTML(num, i));
      downloadCanvas(canvas, `card-${String(num).padStart(3,'0')}-${currentStyle}-slide-${String(i + 1).padStart(2,'0')}.png`);
      await new Promise(r => setTimeout(r, 150));
    }
  }
  status('All cards exported!');
  document.getElementById('btnDownloadAll').disabled = false;
}
